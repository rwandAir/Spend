<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spend Wisely — Login</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;600;700;800&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --blue: #2563eb;
            --blue-dark: #1d4ed8;
            --blue-light: #eff6ff;
            --ink: #0f172a;
            --muted: #64748b;
            --border: #e2e8f0;
            --white: #ffffff;
            --error: #ef4444;
            --success: #10b981;
        }
        body {
            font-family: 'DM Sans', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .card {
            background: var(--white);
            border-radius: 28px;
            padding: 42px 38px;
            width: 100%;
            max-width: 430px;
            box-shadow: 0 32px 80px rgba(0,0,0,0.2);
        }
        .brand {
            text-align: center;
            margin-bottom: 30px;
        }
        .brand-icon {
            width: 58px; height: 58px;
            background: linear-gradient(135deg, var(--blue), #6366f1);
            border-radius: 18px;
            display: flex; align-items: center; justify-content: center;
            margin: 0 auto 14px;
        }
        .brand-icon i { font-size: 1.4rem; color: #fff; }
        .brand h1 {
            font-family: 'Sora', sans-serif;
            font-size: 1.5rem;
            font-weight: 800;
            color: var(--ink);
        }
        .brand h1 span { color: var(--blue); }
        .brand p { font-size: 0.85rem; color: var(--muted); margin-top: 4px; }
        .tabs {
            display: flex;
            background: var(--blue-light);
            border-radius: 14px;
            padding: 4px;
            margin-bottom: 28px;
        }
        .tab-btn {
            flex: 1;
            padding: 10px;
            border: none;
            background: transparent;
            border-radius: 10px;
            font-family: 'Sora', sans-serif;
            font-size: 0.85rem;
            font-weight: 600;
            color: var(--muted);
            cursor: pointer;
        }
        .tab-btn.active {
            background: var(--white);
            color: var(--blue);
            box-shadow: 0 2px 8px rgba(37,99,235,0.12);
        }
        .form-panel { display: none; }
        .form-panel.active { display: block; }
        .field { margin-bottom: 16px; }
        label {
            display: block;
            font-size: 0.8rem;
            font-weight: 600;
            color: var(--ink);
            margin-bottom: 6px;
        }
        .input-wrap { position: relative; }
        .input-wrap i {
            position: absolute;
            left: 14px;
            top: 50%;
            transform: translateY(-50%);
            color: #94a3b8;
        }
        input {
            width: 100%;
            padding: 12px 14px 12px 38px;
            border: 1.5px solid var(--border);
            border-radius: 12px;
            font-family: 'DM Sans', sans-serif;
            font-size: 0.9rem;
            outline: none;
        }
        input:focus {
            border-color: var(--blue);
            box-shadow: 0 0 0 3px rgba(37,99,235,0.1);
        }
        .submit-btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, var(--blue), #6366f1);
            color: #fff;
            border: none;
            border-radius: 14px;
            font-family: 'Sora', sans-serif;
            font-size: 0.95rem;
            font-weight: 700;
            cursor: pointer;
            margin-top: 8px;
            transition: transform 0.2s;
        }
        .submit-btn:hover { transform: translateY(-1px); }
        .submit-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }
        .alert {
            padding: 12px 14px;
            border-radius: 12px;
            font-size: 0.85rem;
            margin-bottom: 16px;
            display: none;
        }
        .alert.show { display: block; }
        .alert.error { background: #fef2f2; color: var(--error); border: 1px solid #fecaca; }
        .alert.success { background: #ecfdf5; color: var(--success); border: 1px solid #a7f3d0; }
        .divider {
            text-align: center;
            font-size: 0.78rem;
            color: var(--muted);
            margin: 18px 0 0;
        }
        .divider a {
            color: var(--blue);
            font-weight: 600;
            text-decoration: none;
            cursor: pointer;
        }
    </style>
</head>
<body>
<div class="card">
    <div class="brand">
        <div class="brand-icon"><i class="fas fa-chart-line"></i></div>
        <h1>Spend <span>Wisely</span></h1>
        <p>Smart financial companion</p>
    </div>

    <div class="tabs">
        <button class="tab-btn active" id="loginTab">Sign In</button>
        <button class="tab-btn" id="registerTab">Create Account</button>
    </div>

    <div class="alert" id="loginAlert"></div>
    <div class="alert" id="registerAlert"></div>

    <!-- LOGIN FORM -->
    <div class="form-panel active" id="loginPanel">
        <div class="field">
            <label>Email Address</label>
            <div class="input-wrap">
                <i class="fas fa-envelope"></i>
                <input type="email" id="loginEmail" placeholder="you@example.com">
            </div>
        </div>
        <div class="field">
            <label>Password</label>
            <div class="input-wrap">
                <i class="fas fa-lock"></i>
                <input type="password" id="loginPassword" placeholder="Enter your password">
            </div>
        </div>
        <button class="submit-btn" id="loginBtn">Sign In</button>
        <p class="divider">Don't have an account? <a id="switchToRegister">Create one</a></p>
    </div>

    <!-- REGISTER FORM -->
    <div class="form-panel" id="registerPanel">
        <div class="field">
            <label>Full Name</label>
            <div class="input-wrap">
                <i class="fas fa-user"></i>
                <input type="text" id="regName" placeholder="Jean Uwimana">
            </div>
        </div>
        <div class="field">
            <label>Email Address</label>
            <div class="input-wrap">
                <i class="fas fa-envelope"></i>
                <input type="email" id="regEmail" placeholder="you@example.com">
            </div>
        </div>
        <div class="field">
            <label>Password</label>
            <div class="input-wrap">
                <i class="fas fa-lock"></i>
                <input type="password" id="regPassword" placeholder="At least 4 characters">
            </div>
        </div>
        <button class="submit-btn" id="registerBtn">Create Account</button>
        <p class="divider">Already have an account? <a id="switchToLogin">Sign in</a></p>
    </div>
</div>

<script>
    var AUTH_URL = 'http://localhost/spend_wisely/api/auth.php';

    // Tab switching
    document.getElementById('loginTab').addEventListener('click', function() { switchTab('login'); });
    document.getElementById('registerTab').addEventListener('click', function() { switchTab('register'); });
    document.getElementById('switchToRegister').addEventListener('click', function(e) { e.preventDefault(); switchTab('register'); });
    document.getElementById('switchToLogin').addEventListener('click', function(e) { e.preventDefault(); switchTab('login'); });

    function switchTab(tab) {
        var isLogin = (tab === 'login');
        var loginPanel = document.getElementById('loginPanel');
        var registerPanel = document.getElementById('registerPanel');
        var loginTab = document.getElementById('loginTab');
        var registerTab = document.getElementById('registerTab');
        var loginAlert = document.getElementById('loginAlert');
        var registerAlert = document.getElementById('registerAlert');
        
        if (isLogin) {
            loginPanel.classList.add('active');
            registerPanel.classList.remove('active');
            loginTab.classList.add('active');
            registerTab.classList.remove('active');
        } else {
            loginPanel.classList.remove('active');
            registerPanel.classList.add('active');
            loginTab.classList.remove('active');
            registerTab.classList.add('active');
        }
        
        loginAlert.classList.remove('show');
        registerAlert.classList.remove('show');
    }

    function showAlert(id, message, type) {
        var el = document.getElementById(id);
        el.textContent = message;
        el.className = 'alert ' + type + ' show';
    }

    // LOGIN FUNCTION
    async function handleLogin() {
        var alertDiv = document.getElementById('loginAlert');
        alertDiv.classList.remove('show');
        
        var email = document.getElementById('loginEmail').value.trim();
        var password = document.getElementById('loginPassword').value;
        
        if (!email || !password) {
            showAlert('loginAlert', 'Please enter email and password', 'error');
            return;
        }
        
        var loginBtn = document.getElementById('loginBtn');
        var originalText = loginBtn.textContent;
        loginBtn.textContent = 'Signing in...';
        loginBtn.disabled = true;
        
        try {
            var response = await fetch(AUTH_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ action: 'login', email: email, password: password })
            });
            
            var data = await response.json();
            
            if (data.success) {
                localStorage.setItem('sw_user_id', data.user_id);
                localStorage.setItem('sw_user_name', data.name);
                localStorage.setItem('sw_user_role', data.role);
                localStorage.setItem('sw_balance', data.balance);
                
                showAlert('loginAlert', 'Welcome back, ' + data.name + '! Redirecting...', 'success');
                
                setTimeout(function() {
                    if (data.role === 'admin') {
                        window.location.href = 'admin/admin_dashboard.php';
                    } else {
                        window.location.href = 'dashboard.html';
                    }
                }, 1000);
            } else {
                showAlert('loginAlert', data.error || 'Login failed', 'error');
                loginBtn.textContent = originalText;
                loginBtn.disabled = false;
            }
        } catch (error) {
            console.error('Login error:', error);
            showAlert('loginAlert', 'Cannot connect to server. Make sure WAMP is running.', 'error');
            loginBtn.textContent = originalText;
            loginBtn.disabled = false;
        }
    }

    // REGISTER FUNCTION
    async function handleRegister() {
        var alertDiv = document.getElementById('registerAlert');
        alertDiv.classList.remove('show');
        
        var name = document.getElementById('regName').value.trim();
        var email = document.getElementById('regEmail').value.trim();
        var password = document.getElementById('regPassword').value;
        
        if (!name || !email || !password) {
            showAlert('registerAlert', 'Please fill in all fields', 'error');
            return;
        }
        
        if (password.length < 4) {
            showAlert('registerAlert', 'Password must be at least 4 characters', 'error');
            return;
        }
        
        var registerBtn = document.getElementById('registerBtn');
        var originalText = registerBtn.textContent;
        registerBtn.textContent = 'Creating account...';
        registerBtn.disabled = true;
        
        try {
            var response = await fetch(AUTH_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ action: 'register', name: name, email: email, password: password })
            });
            
            var data = await response.json();
            
            if (data.success) {
                localStorage.setItem('sw_user_id', data.user_id);
                localStorage.setItem('sw_user_name', data.name);
                localStorage.setItem('sw_user_role', data.role);
                localStorage.setItem('sw_balance', data.balance);
                
                showAlert('registerAlert', 'Account created! Welcome, ' + data.name + '! Redirecting to dashboard...', 'success');
                
                setTimeout(function() {
                    window.location.href = 'dashboard.html';
                }, 1500);
            } else {
                showAlert('registerAlert', data.error || 'Registration failed', 'error');
                registerBtn.textContent = originalText;
                registerBtn.disabled = false;
            }
        } catch (error) {
            console.error('Register error:', error);
            showAlert('registerAlert', 'Cannot connect to server. Make sure WAMP is running.', 'error');
            registerBtn.textContent = originalText;
            registerBtn.disabled = false;
        }
    }

    // Attach event listeners
    document.getElementById('loginBtn').addEventListener('click', handleLogin);
    document.getElementById('registerBtn').addEventListener('click', handleRegister);

    // Handle tab switching via URL parameter
    window.addEventListener('DOMContentLoaded', function() {
        var params = new URLSearchParams(window.location.search);
        if (params.get('tab') === 'register') {
            switchTab('register');
        }
    });

    // Enter key support
    document.addEventListener('keydown', function(e) {
        if (e.key !== 'Enter') return;
        var isLoginActive = document.getElementById('loginPanel').classList.contains('active');
        if (isLoginActive) {
            handleLogin();
        } else {
            handleRegister();
        }
    });
</script>
</body>
</html>
