<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spend Wisely - Transactions</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: #f8fafc;
            color: #374151;
            overflow-x: hidden;
        }

        .header {
            background: #ffffff;
            padding: 16px 24px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
            position: fixed;
            top: 0;
            right: 0;
            left: 0;
            z-index: 100;
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .menu-btn {
            background: none;
            border: none;
            font-size: 1.5rem;
            cursor: pointer;
            color: #2563eb;
            padding: 8px;
            border-radius: 8px;
            transition: background 0.2s;
        }

        .menu-btn:hover {
            background: #f0f0f0;
        }

        .logo h1 {
            font-size: 1.5rem;
            color: #2563eb;
        }

        .logo span {
            color: #1e293b;
        }

        .user-info {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .balance {
            background: #f0fdf4;
            padding: 8px 16px;
            border-radius: 30px;
            font-weight: 600;
            color: #059669;
        }

        .app-container {
            display: flex;
            margin-top: 70px;
            min-height: calc(100vh - 70px);
        }

        .sidebar-overlay {
            position: fixed;
            top: 70px;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.5);
            z-index: 98;
            display: none;
        }

        .sidebar-overlay.active {
            display: block;
        }

        .sidebar {
            width: 280px;
            background: #ffffff;
            border-right: 1px solid #e5e7eb;
            padding: 24px 0;
            transition: all 0.3s ease;
            position: fixed;
            left: -280px;
            top: 70px;
            bottom: 0;
            overflow-y: auto;
            z-index: 99;
        }

        .sidebar.open {
            left: 0;
        }

        .nav-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 20px;
            margin: 4px 12px;
            border-radius: 12px;
            text-decoration: none;
            color: #6b7280;
            font-weight: 500;
            transition: all 0.2s;
        }

        .nav-item:hover {
            background: #f9fafb;
            color: #2563eb;
        }

        .nav-item.active {
            background: #eff6ff;
            color: #2563eb;
        }

        .nav-item i {
            width: 24px;
            font-size: 1.2rem;
            text-align: center;
        }

        .main-content {
            flex: 1;
            margin-left: 0;
            padding: 24px;
            background: #f8fafc;
        }

        .card {
            background: #ffffff;
            border-radius: 24px;
            padding: 24px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.06);
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 16px;
            margin-bottom: 24px;
            padding-bottom: 16px;
            border-bottom: 2px solid #f3f4f6;
        }

        .card-header h2 {
            font-size: 1.3rem;
            color: #1f2937;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .search-section {
            margin-bottom: 24px;
        }

        .search-bar {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            align-items: center;
        }

        .search-input {
            flex: 1;
            min-width: 200px;
            padding: 12px 18px;
            border: 2px solid #d1d5db;
            border-radius: 40px;
            font-size: 0.9rem;
            transition: all 0.2s;
            font-family: inherit;
        }

        .search-input:focus {
            outline: none;
            border-color: #2563eb;
        }

        .category-filter {
            min-width: 150px;
            padding: 12px 18px;
            border: 2px solid #d1d5db;
            border-radius: 40px;
            font-size: 0.9rem;
            background: white;
            cursor: pointer;
            font-family: inherit;
        }

        .category-filter:focus {
            outline: none;
            border-color: #2563eb;
        }

        .search-btn {
            background: #2563eb;
            border: none;
            padding: 12px 24px;
            border-radius: 40px;
            color: white;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }

        .search-btn:hover {
            background: #1d4ed8;
        }

        .reset-btn {
            background: #f3f4f6;
            border: none;
            padding: 12px 24px;
            border-radius: 40px;
            color: #6b7280;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }

        .reset-btn:hover {
            background: #e5e7eb;
        }

        .filter-stats {
            margin-top: 12px;
            font-size: 0.85rem;
            color: #9ca3af;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
        }

        .active-filter {
            background: #eff6ff;
            padding: 6px 12px;
            border-radius: 20px;
            color: #2563eb;
            font-size: 0.8rem;
        }

        .loading-state {
            text-align: center;
            padding: 60px;
            color: #9ca3af;
        }

        .loading-spinner {
            width: 40px;
            height: 40px;
            border: 3px solid #e5e7eb;
            border-top-color: #2563eb;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 16px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .transactions-table {
            width: 100%;
            border-collapse: collapse;
        }

        .transactions-table th {
            text-align: left;
            padding: 14px 12px;
            color: #9ca3af;
            font-weight: 600;
            border-bottom: 2px solid #e5e7eb;
            font-size: 0.85rem;
        }

        .transactions-table td {
            padding: 14px 12px;
            border-bottom: 1px solid #e5e7eb;
            font-size: 0.9rem;
        }

        .amount {
            font-weight: 600;
            color: #dc2626;
        }

        .category-badge {
            background: #f3f4f6;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 500;
            display: inline-block;
        }

        .empty-state {
            text-align: center;
            padding: 60px;
            color: #9ca3af;
        }

        footer {
            text-align: center;
            padding: 16px;
            color: #9ca3af;
            font-size: 0.75rem;
            border-top: 1px solid #e5e7eb;
            background: #ffffff;
        }

        @media (max-width: 768px) {
            .main-content {
                padding: 16px;
            }
            .card {
                padding: 18px;
            }
            .transactions-table th,
            .transactions-table td {
                padding: 10px 8px;
                font-size: 0.8rem;
            }
            .search-bar {
                flex-direction: column;
            }
            .search-input,
            .category-filter,
            .search-btn,
            .reset-btn {
                width: 100%;
            }
        }
    </style>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body>
    <div class="header">
        <div class="header-left">
            <button class="menu-btn" id="menuToggleBtn">
                <i class="fas fa-bars"></i>
            </button>
            <div class="logo">
                <h1>Spend <span>Wisely</span></h1>
            </div>
        </div>
        <div class="user-info">
            <span id="userNameDisplay"> Loading...</span>
            <div class="balance" id="balanceDisplay">RWF 45000</div>
        </div>
    </div>

    <div class="app-container">
        <div class="sidebar-overlay" id="sidebarOverlay"></div>
        <div class="sidebar" id="sidebar">
            <a href="dashboard.html" class="nav-item">
                <i class="fas fa-tachometer-alt"></i>
                <span class="nav-text">Dashboard</span>
            </a>
            <a href="transactions.html" class="nav-item active">
                <i class="fas fa-exchange-alt"></i>
                <span class="nav-text">Transactions</span>
            </a>
            <a href="expenses.html" class="nav-item">
                <i class="fas fa-receipt"></i>
                <span class="nav-text">Expenses</span>
            </a>
            <a href="budget.html" class="nav-item">
                <i class="fas fa-tags"></i>
                <span class="nav-text">Budget</span>
            </a>
            <a href="reports.html" class="nav-item">
                <i class="fas fa-chart-line"></i>
                <span class="nav-text">Reports</span>
            </a>
        </div>

        <div class="main-content">
            <div class="card">
                <div class="card-header">
                    <h2>
                        <i class="fas fa-exchange-alt" style="color: #2563eb;"></i>
                        Transaction History
                    </h2>
                    <button class="reset-btn" id="resetFilterBtn">
                        <i class="fas fa-sync-alt"></i> Reset
                    </button>
                </div>

                <div class="search-section">
                    <div class="search-bar">
                        <input type="text" id="searchInput" class="search-input" placeholder="Search by description...">
                        <select id="categoryFilter" class="category-filter">
                            <option value="all">All Categories</option>
                        </select>
                        <button class="search-btn" id="searchBtn">
                            <i class="fas fa-search"></i> Search
                        </button>
                    </div>
                    <div class="filter-stats" id="filterStats">
                        <div><i class="fas fa-spinner fa-pulse"></i> Loading transactions...</div>
                    </div>
                </div>

                <div style="overflow-x: auto;">
                    <table class="transactions-table">
                        <thead>
                            <tr>
                                <th>Date</th>
                                <th>Description</th>
                                <th>Category</th>
                                <th>Amount</th>
                                <th>Payment Method</th>
                            </tr>
                        </thead>
                        <tbody id="transactionsBody">
                            <tr>
                                <td colspan="5" class="loading-state">
                                    <div class="loading-spinner"></div>
                                    Loading transactions...
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <footer>
        Spend Wisely — Smart Financial Companion
    </footer>

    <script>
        // Add near the top of the script section
function updateUserName() {
    const userName = localStorage.getItem('sw_user_name');
    if (userName) {
        document.getElementById('userNameDisplay').innerHTML = '👋 ' + userName;
    }
}
updateUserName();
        const API_URL = 'http://localhost/spend_wisely/api/get_transactions.php';
        
        let allTransactions = [];
        let categories = [];
        let currentFilteredTransactions = [];
        let activeFilters = { search: "", category: "all" };
        let balance = 0;

        function formatMoney(amount) {
            return "RWF " + amount.toLocaleString();
        }

        function updateBalance() {
            document.getElementById('balanceDisplay').innerText = formatMoney(balance);
        }

        async function fetchTransactions() {
            try {
                const response = await fetch(API_URL);
                const data = await response.json();
                
                if (data.success) {
                    allTransactions = data.transactions;
                    currentFilteredTransactions = [...allTransactions];
                    balance = data.balance;
                    
                    const uniqueCategories = [...new Set(allTransactions.map(t => t.category))];
                    categories = uniqueCategories;
                    
                    const categorySelect = document.getElementById('categoryFilter');
                    categorySelect.innerHTML = '<option value="all">All Categories</option>';
                    uniqueCategories.forEach(cat => {
                        categorySelect.innerHTML += `<option value="${cat}">${cat}</option>`;
                    });
                    
                    updateBalance();
                    renderTransactions();
                    updateFilterStats();
                } else {
                    throw new Error(data.error || 'Failed to load transactions');
                }
            } catch (error) {
                console.error('Error fetching transactions:', error);
                document.getElementById('transactionsBody').innerHTML = `
                    <tr>
                        <td colspan="5" class="empty-state">
                            <i class="fas fa-exclamation-circle"></i> Error loading transactions<br>
                            <small>${error.message}</small>
                        </td>
                    </tr>
                `;
                document.getElementById('filterStats').innerHTML = `
                    <div><i class="fas fa-exclamation-triangle"></i> Failed to connect to server</div>
                `;
            }
        }

        function renderTransactions() {
            const tbody = document.getElementById('transactionsBody');
            
            if (currentFilteredTransactions.length === 0) {
                tbody.innerHTML = `
                    <tr>
                        <td colspan="5" class="empty-state">
                            <i class="fas fa-search"></i> No transactions match your search
                        </td>
                    </tr>
                `;
                return;
            }

            tbody.innerHTML = currentFilteredTransactions.map(t => `
                <tr>
                    <td>${t.transaction_date || t.date}</td>
                    <td><strong>${escapeHtml(t.description)}</strong></td>
                    <td><span class="category-badge">${escapeHtml(t.category)}</span></td>
                    <td class="amount">${formatMoney(t.amount)}</td>
                    <td><i class="fas fa-mobile-alt"></i> ${escapeHtml(t.payment_method || 'Cash')}</td>
                </tr>
            `).join('');
        }

        function updateFilterStats() {
            const statsDiv = document.getElementById('filterStats');
            const totalCount = currentFilteredTransactions.length;
            const totalAmount = currentFilteredTransactions.reduce((sum, t) => sum + t.amount, 0);
            
            let filterInfo = '';
            if (activeFilters.search) {
                filterInfo += `<span class="active-filter"><i class="fas fa-search"></i> "${activeFilters.search}"</span>`;
            }
            if (activeFilters.category !== 'all') {
                filterInfo += `<span class="active-filter"><i class="fas fa-tag"></i> ${activeFilters.category}</span>`;
            }
            
            if (filterInfo) {
                statsDiv.innerHTML = `
                    <div><i class="fas fa-filter"></i> Filters: ${filterInfo}</div>
                    <div><i class="fas fa-chart-line"></i> ${totalCount} transactions | Total: ${formatMoney(totalAmount)}</div>
                `;
            } else {
                statsDiv.innerHTML = `
                    <div><i class="fas fa-database"></i> Showing ${totalCount} transactions</div>
                    <div><i class="fas fa-chart-line"></i> Total: ${formatMoney(totalAmount)}</div>
                `;
            }
        }

        function filterTransactions() {
            let filtered = [...allTransactions];
            
            if (activeFilters.search) {
                const searchTerm = activeFilters.search.toLowerCase();
                filtered = filtered.filter(t => 
                    t.description.toLowerCase().includes(searchTerm)
                );
            }
            
            if (activeFilters.category !== 'all') {
                filtered = filtered.filter(t => 
                    t.category === activeFilters.category
                );
            }
            
            currentFilteredTransactions = filtered;
            renderTransactions();
            updateFilterStats();
        }

        function performSearch() {
            const searchInput = document.getElementById('searchInput');
            const categorySelect = document.getElementById('categoryFilter');
            
            activeFilters.search = searchInput.value.trim();
            activeFilters.category = categorySelect.value;
            
            filterTransactions();
        }

        function resetFilters() {
            document.getElementById('searchInput').value = '';
            document.getElementById('categoryFilter').value = 'all';
            
            activeFilters.search = '';
            activeFilters.category = 'all';
            
            filterTransactions();
        }

        function escapeHtml(str) {
            if (!str) return '';
            return str.replace(/[&<>]/g, function(m) {
                if (m === '&') return '&amp;';
                if (m === '<') return '&lt;';
                if (m === '>') return '&gt;';
                return m;
            });
        }

        const menuToggleBtn = document.getElementById('menuToggleBtn');
        const sidebar = document.getElementById('sidebar');
        const overlay = document.getElementById('sidebarOverlay');

        function openSidebar() {
            sidebar.classList.add('open');
            overlay.classList.add('active');
            document.body.style.overflow = 'hidden';
        }

        function closeSidebar() {
            sidebar.classList.remove('open');
            overlay.classList.remove('active');
            document.body.style.overflow = '';
        }

        function toggleSidebar() {
            if (sidebar.classList.contains('open')) {
                closeSidebar();
            } else {
                openSidebar();
            }
        }

        menuToggleBtn.addEventListener('click', toggleSidebar);
        overlay.addEventListener('click', closeSidebar);

        document.querySelectorAll('.nav-item').forEach(link => {
            link.addEventListener('click', closeSidebar);
        });

        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape' && sidebar.classList.contains('open')) {
                closeSidebar();
            }
            if (e.key === 'Enter' && document.activeElement.id === 'searchInput') {
                performSearch();
            }
        });

        document.getElementById('searchBtn').addEventListener('click', performSearch);
        document.getElementById('resetFilterBtn').addEventListener('click', resetFilters);
        document.getElementById('categoryFilter').addEventListener('change', performSearch);
        
        let searchTimeout;
        document.getElementById('searchInput').addEventListener('input', (e) => {
            clearTimeout(searchTimeout);
            searchTimeout = setTimeout(() => {
                performSearch();
            }, 300);
        });

        fetchTransactions();
    </script>
</body>
</html>
